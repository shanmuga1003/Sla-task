<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>task 10 main</title>
  <style>
    body {
      margin: 0;
    }

    .outercontainer {
      height: 100vh;
      background-color: lightsteelblue;
    }

    .container1 {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }

    .container3 {
      text-align: center;
    }

    .container2 {
      display: flex;
      justify-content: center;
      flex-direction: row;
      align-items: center;
      height: 500px;
      gap: 80px;

    }

    .red {
      width: 200px;
      height: 200px;
      background-color: rgb(220, 28, 28);
      border: 2px solid black;
      text-align: center;
      line-height: 5.5cm;
      font-weight: bold;
      font-size: 20px;
    }

    .orange {
      width: 200px;
      height: 200px;
      background-color: rgb(230, 107, 40);
      border: 2px solid black;
      text-align: center;
      line-height: 5.5cm;
      font-weight: bold;
      font-size: 20px;
    }

    .green {
      width: 200px;
      height: 200px;
      background-color: rgb(115, 220, 39);
      border: 2px solid black;
      text-align: center;
      line-height: 5.5cm;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div class="outercontainer">
    <div class="container1">
      <h1>Traffic signals</h1>
    </div>
    <div class="container2">

      <div class="red">STOP</div>
      <div class="orange">READY</div>
      <div class="green">GO</div>
    </div>
    <div class="container3">
      <h1>Follow the Rules because we are watching you</h1>
    </div>
  </div>
</body>

</html>
