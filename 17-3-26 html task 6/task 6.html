<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>task 6</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-image: url("still-life-books-versus-technology.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      align-items: center;
    justify-content: center;
    }
    .reg{
      position: absolute;
      left: 32%;
      top: 6%;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 45px;

    
      padding: 65px;
      width: 600px;

      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
    }

    .group {
      display: flex;
      align-items: center;
      
    }

    label {
      font-size: 24px;
      color: rgb(254, 251, 251);
      width: 120px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      
    }

    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      border-radius: 5px;
    }
    h1{
      text-align: center;
      background: linear-gradient(90deg,rgba(0, 145, 230, 1) 0%, rgba(255, 0, 221, 1) 100%);
       -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
      font-size: 45px;
      
    }
    .inline{
      display: flex;
      gap: 10px;
      align-items: center;
    }
    #sub{
      padding: 10px;
      font-size: 20px;
      background: linear-gradient(90deg,rgba(0, 145, 230, 1) 0%, rgba(255, 0, 221, 1) 100%);
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="reg">
    
    <form action="welcome.html" class="container">
      <h1>Registration form</h1>
      <div class="group">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" placeholder="Enter your name" tabindex="1" required />
      </div>

      <div class="group">
        <label for="mail">E-mail</label>
        <input type="email" id="mail" placeholder="Enter your E-mail" tabindex="2" required />
      </div>
      <div class="group">
        <label for="pas">Password</label>
        <input type="password" id="pas" placeholder="Enter your password" tabindex="3" minlength="6" required />
      </div>
      <div class="group">
        <label for="gender">Gender</label>
      <div class="inline">
        <input type="radio" name="gen" id="gender" tabindex="4" required /><label>Male</label>
        <input type="radio" name="gen" id="gender" tabindex="4"  /><label>Female</label>
        </div>
      </div>
      <div class="group">
        <label for="hob">Hobbies</label>
        <div class="inline">
        <input type="checkbox" name="gen" id="hob" tabindex="5" /><label>Sports</label>
        <input type="checkbox" name="gen" id="hob" tabindex="5" /><label>dancing</label>
        <input type="checkbox" name="gen" id="hob" tabindex="5" /><label>Singing</label>
        </div>
      </div>
      <div class="group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your Age" tabindex="6" min="4" max="17" required />
      </div>

      <input id="sub" type="submit" value="click here" />
    </form>
  </div>
</body>

</html>
